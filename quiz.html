<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif Bengali', sans-serif; background: #f8fafc; margin: 0; padding-bottom: 80px; }
        .header { background: #1e3a8a; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .q-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #060a0f; }
        
        /* Option Styling & Hover */
        .option { 
            display: block; background: #f1f5f9; padding: 14px; margin: 10px 0; 
            border-radius: 10px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; 
        }
        .option:hover { background: #e2e8f0; border-color: #cbd5e1; }

        /* Instant Feedback Colors */
        .option.correct { background: #dcfce7 !important; border-color: #166534 !important; color: #166534; font-weight: 600; }
        .option.wrong { background: #fee2e2 !important; border-color: #991b1b !important; color: #991b1b; }
        .disabled { pointer-events: none; opacity: 0.8; }

        .footer-btn { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); text-align: center; }
        .submit-btn { background: #1e3a8a; color: white; padding: 12px 40px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h3 id="chap-name" style="margin:0;">লোড হচ্ছে...</h3>
</div>

<div class="container" id="quiz-container"></div>

<div class="footer-btn">
    <button class="submit-btn" onclick="showResults()">পরীক্ষা শেষ করুন</button>
</div>

<script>
    let questions = [];
    let score = 0;
    const chap = localStorage.getItem("chapter");
    document.getElementById("chap-name").innerText = chap;

    fetch(API + `?action=questions&chapter=${encodeURIComponent(chap)}`)
    .then(r => r.json())
    .then(data => {
        questions = data;
        let container = document.getElementById("quiz-container");
        let html = "";
        
        data.forEach((q, qIndex) => {
            html += `<div class="q-card" id="q-block-${qIndex}">
                <div class="question-text">${qIndex + 1}. ${q.q}</div>`;
            q.o.forEach((opt, oIndex) => {
                html += `<div class="option" onclick="checkAnswer(this, ${qIndex}, '${opt}', '${q.a}')">${opt}</div>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
    });

    // TATKHANIK CHECK (Instant Feedback)
    function checkAnswer(element, qIndex, selected, correct) {
        let parent = document.getElementById(`q-block-${qIndex}`);
        let allOptions = parent.querySelectorAll('.option');

        // উত্তর চেক
        if (selected === correct) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('wrong');
            // সঠিক উত্তরটি খুঁজে বের করে সবুজ করা
            allOptions.forEach(opt => {
                if(opt.innerText === correct) opt.classList.add('correct');
            });
        }

        // অপশনগুলো ডিজেবল করা যাতে আবার ক্লিক না যায়
        allOptions.forEach(opt => opt.classList.add('disabled'));
    }

    function showResults() {
        let total = questions.length;
        let percent = (score / total) * 100;
        let msg = "";
        
        if(percent >= 80) msg = "অসাধারণ! আপনার প্রস্তুতি খুবই ভালো। 🔥";
        else if(percent >= 50) msg = "ভালো হচ্ছে, আরও একটু পরিশ্রম করুন! 💪";
        else msg = "মন দিয়ে পড়াশোনা করুন, হার মানবেন না! 📚";

        alert(`আপনার স্কোর: ${score}/${total}\n\n${msg}`);
        
        const user = localStorage.getItem("user");
        fetch(API + `?action=submit&username=${user}&chapter=${chap}&score=${score}&total=${total}`);
        
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
