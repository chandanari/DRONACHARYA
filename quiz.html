<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Shonar Bangla', Adorsholipi, Noto Serif Bengali, Tiro Bangla, Segoe UI, sans-serif; background: #f8fafc; margin: 0; padding-bottom: 80px; }
        .header { background: #1e3a8a; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .q-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #060a0f; }
        
        .option { 
            display: block; background: #f1f5f9; padding: 14px; margin: 10px 0; 
            border-radius: 10px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; 
        }
        .option:hover { background: #e2e8f0; border-color: #cbd5e1; }

        /* Feedback Colors */
        .option.correct { background: #dcfce7 !important; border-color: #166534 !important; color: #166534; font-weight: 600; }
        .option.wrong { background: #fee2e2 !important; border-color: #991b1b !important; color: #991b1b; }
        .disabled { pointer-events: none; opacity: 0.8; }

        .footer-btn { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); text-align: center; }
        .submit-btn { font-family: 'Shonar Bangla', Adorsholipi; background: #1e3a8a; color: white; padding: 12px 40px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* Professional Modal Styling */
        #resultModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; width: 85%; max-width: 400px; padding: 30px; 
            border-radius: 25px; text-align: center; animation: popUp 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-score { font-size: 45px; font-weight: 800; color: #1e3a8a; margin: 15px 0; }
        .modal-msg { font-size: 18px; color: #475569; margin-bottom: 25px; line-height: 1.5; }
        .modal-btn { 
            background: #1e3a8a; color: white; border: none; padding: 12px 30px; 
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h3 id="chap-name" style="margin:0;">অপেক্ষা করুন...</h3>
</div>

<div class="container" id="quiz-container"></div>

<div class="footer-btn">
    <button class="submit-btn" onclick="showResults()">পরীক্ষা শেষ করুন</button>
</div>

<div id="resultModal">
    <div class="modal-content">
        <div id="modal-icon" style="font-size: 60px; margin-bottom: 10px;"></div>
        <h2 style="margin:0; color: #1e3a8a;">আপনার ফলাফল</h2>
        <div class="modal-score" id="modal-score-text">0/0</div>
        <p class="modal-msg" id="modal-msg-text"></p>
        <button class="modal-btn" onclick="closeAndGoBack()">ফিরে যান</button>
    </div>
</div>

<script>
    let questions = [];
    let score = 0;
    let answeredCount = 0; // কতগুলো উত্তর দেওয়া হয়েছে তা ট্র্যাকিং করতে
    const chap = localStorage.getItem("chapter");
    document.getElementById("chap-name").innerText = chap;

    // লোডিং মেসেজ
    document.getElementById("quiz-container").innerHTML = "<p style='text-align:center; margin-top:50px;'>প্রশ্ন লোড হচ্ছে...</p>";

    fetch(API + `?action=questions&chapter=${encodeURIComponent(chap)}`)
    .then(r => r.json())
    .then(data => {
        questions = data;
        let container = document.getElementById("quiz-container");
        let html = "";
        
        if(data.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>কোনো প্রশ্ন পাওয়া যায়নি।</p>";
            return;
        }

        data.forEach((q, qIndex) => {
            html += `<div class="q-card" id="q-block-${qIndex}">
                <div class="question-text">${qIndex + 1}. ${q.q}</div>`;
            q.o.forEach((opt, oIndex) => {
                html += `<div class="option" onclick="checkAnswer(this, ${qIndex}, '${opt}', '${q.a}')">${opt}</div>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
    });

    function checkAnswer(element, qIndex, selected, correct) {
        let parent = document.getElementById(`q-block-${qIndex}`);
        let allOptions = parent.querySelectorAll('.option');

        if (selected === correct) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('wrong');
            allOptions.forEach(opt => {
                if(opt.innerText === correct) opt.classList.add('correct');
            });
        }

        allOptions.forEach(opt => opt.classList.add('disabled'));
        answeredCount++;
    }

    function showResults() {
        let total = questions.length;
        if(total === 0) return;

        let percent = (score / total) * 100;
        let msg = "";
        let icon = "";
        
        if(percent >= 80) {
            msg = "অসাধারণ! আপনার প্রস্তুতি খুবই ভালো। 🔥";
            icon = "🏆";
        } else if(percent >= 50) {
            msg = "ভালো হচ্ছে, আরও একটু পরিশ্রম করুন! 💪";
            icon = "😊";
        } else {
            msg = "মন দিয়ে পড়াশোনা করুন, হার মানবেন না! 📚";
            icon = "👨‍🏫";
        }

        // সেট আপ কাস্টম মোডাল
        document.getElementById("modal-score-text").innerText = `${score} / ${total}`;
        document.getElementById("modal-msg-text").innerText = msg;
        document.getElementById("modal-icon").innerText = icon;
        document.getElementById("resultModal").style.display = "flex";

        // ব্যাকএন্ডে ফলাফল পাঠানো
        const user = localStorage.getItem("user");
        fetch(API + `?action=submit&username=${encodeURIComponent(user)}&chapter=${encodeURIComponent(chap)}&score=${score}&total=${total}`);
    }

    function closeAndGoBack() {
        window.location.href = "chapters.html";
    }
</script>
</body>
</html>
